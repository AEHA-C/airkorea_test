name: AirKorea Scheduler

on:
  workflow_dispatch:
    inputs:
      target:
        description: "수동 실행 대상 runType"
        required: true
        default: "정각"
        type: choice
        options:
          - 정각
          - 20분
          - 23분

  schedule:
    - cron: "0 * * * *"
    - cron: "20 * * * *"
    - cron: "23 * * * *"

jobs:
  run-airkorea:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 서비스 계정 JSON 파일 생성
        run: |
          cat <<'EOF' > service_account.json
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: 현재 UTC/KST 시간 출력
        run: |
          date -u +"%Y-%m-%d %H:%M:%S UTC"
          TZ=Asia/Seoul date +"%Y-%m-%d %H:%M:%S KST"

      - name: 정각 실행
        if: |
          (github.event_name == 'schedule' && github.event.schedule == '0 * * * *') ||
          (github.event_name == 'workflow_dispatch' && inputs.target == '정각')
        run: python main_hourly_00.py

      - name: 20분 실행
        if: |
          (github.event_name == 'schedule' && github.event.schedule == '20 * * * *') ||
          (github.event_name == 'workflow_dispatch' && inputs.target == '20분')
        run: python main_hourly_20.py

      - name: 23분 실행
        if: |
          (github.event_name == 'schedule' && github.event.schedule == '23 * * * *') ||
          (github.event_name == 'workflow_dispatch' && inputs.target == '23분')
        run: python main_hourly_23.py
