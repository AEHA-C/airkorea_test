name: AirKorea Scheduler

on:
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"
    - cron: "33 * * * *"
    - cron: "43 * * * *"

jobs:
  run-airkorea:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4
        with
          ref: codex/fix-to-use-kst

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 서비스 계정 JSON 파일 생성
        run: |
          cat <<'EOF' > service_account.json
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: 23분 실행
        if: github.event.schedule == '23 * * * *'
        run: python main_hourly_23.py

      - name: 33분 실행
        if: github.event.schedule == '33 * * * *'
        run: python main_hourly_33.py

      - name: 43분 실행
        if: github.event.schedule == '43 * * * *'
        run: python main_hourly_43.py
