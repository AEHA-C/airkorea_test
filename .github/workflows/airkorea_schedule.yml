name: AirKorea Scheduler

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"
    - cron: "20 * * * *"
    - cron: "23 * * * *"

jobs:
  run-airkorea:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 서비스 계정 JSON 파일 생성
        run: |
          cat <<'EOF' > service_account.json
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: 현재 분 확인
        id: minute_check
        run: |
          echo "minute=$(date -u +'%M')" >> $GITHUB_OUTPUT

      - name: 정각 실행
        if: steps.minute_check.outputs.minute == '00'
        run: python main_hourly_00.py

      - name: 20분 실행
        if: steps.minute_check.outputs.minute == '20'
        run: python main_hourly_20.py

      - name: 23분 실행
        if: steps.minute_check.outputs.minute == '23'
        run: python main_hourly_23.py
