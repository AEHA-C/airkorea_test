# .github/workflows/airkorea_33.yml

name: AirKorea 33분 수집

on:
  schedule:
    - cron: "33 * * * *"

jobs:
  run-airkorea-33:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 서비스 계정 JSON 파일 생성
        run: |
          cat <<'EOF' > service_account.json
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: 현재 UTC 시간 출력
        run: date -u +"%Y-%m-%d %H:%M:%S UTC"

      - name: 현재 KST 시간 출력
        run: TZ=Asia/Seoul date +"%Y-%m-%d %H:%M:%S KST"

      - name: 33분 수집 실행
        run: python main_hourly_33.py
